<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Sinfonía de Granos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
        }

        .login-container {
            background: white;
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .login-container h1 {
            color: #3b2a1e;
            margin-bottom: 5px;
        }

        .eslogan {
            font-style: italic;
            color: #7a5c47;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #5a4636;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .extra {
            margin-top: 20px;
            font-size: 13px;
        }

        .extra a {
            cursor: pointer;
            color: #4b2e2e;
            font-weight: bold;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <div class="login-container">
        <h1>Sinfonía de Granos</h1>
        <div class="eslogan">"De la semilla a la taza"</div>

        <div class="input-group">
            <label>Correo electrónico</label>
            <input type="email" id="email">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password">
        </div>

        <button type="button" class="btn-login" onclick="login()">
            Iniciar Sesión
        </button>

        <div class="extra">
            ¿No tienes cuenta? <a onclick="register()">Regístrate</a>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://ibftxwnyyxxvouymdcxu.supabase.co";
        const supabaseKey = "TU_KEY_AQUI"; // ⚠️ pega tu key

        const supabase = window.supabase.createClient(
            supabaseUrl,
            supabaseKey
        );

        async function login() {

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                alert(error.message);
            } else {
                window.location.href = "principal.html";
            }
        }

        async function register() {

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const { data, error } = await supabase.auth.signUp({
                email,
                password
            });

            if (error) {
                alert(error.message);
            } else {
                alert("Usuario registrado correctamente");
            }
        }
    </script>

</body>
</html>
