<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Sinfonía de Granos</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
        }

        .login-container {
            background: white;
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .login-container h1 {
            color: #3b2a1e;
            margin-bottom: 5px;
        }

        .eslogan {
            font-style: italic;
            color: #7a5c47;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #5a4636;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
        }

        .extra {
            margin-top: 20px;
            font-size: 13px;
            color: #777;
        }

        .extra a {
            color: #4b2e2e;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <h1>Sinfonía de Granos</h1>
        <div class="eslogan">"De la semilla a la taza"</div>

        <form id="loginForm">

            <div class="input-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn-login">
                Iniciar Sesión
            </button>

        </form>

        <div class="extra">
            ¿No tienes cuenta? <a href="register.html">Regístrate</a>
        </div>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {

            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const { error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                alert("Error: " + error.message);
                return;
            }

            window.location.href = "principal.html";

        });

        async function checkSession() {
            const { data } = await supabaseClient.auth.getSession();

            if (data.session) {
                window.location.href = "principal.html";
            }
        }

        checkSession();
    </script>

</body>

</html>
