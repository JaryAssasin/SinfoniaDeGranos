<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos - Sinfonía de Granos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/header.js"></script>
    <script src="js/productos.js"></script>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Segoe UI',sans-serif; background:linear-gradient(to bottom,#f4f1ee,#e8e2dc); }

        .header {
            background:linear-gradient(to right,#4b2e2e,#2e1b1b);
            color:white; display:flex; justify-content:space-between;
            align-items:center; padding:18px 30px; font-size:20px;
        }
        .header-right { display:flex; gap:15px; align-items:center; }
        .icon-btn {
            background:white; color:#2e1b1b; border:none; padding:8px 12px;
            border-radius:8px; cursor:pointer; transition:transform .2s,box-shadow .2s;
        }
        .icon-btn:hover { transform:translateY(-1px); box-shadow:0 3px 8px rgba(0,0,0,.2); }
        .user-menu { position:relative; }

        /* Pill usuario */
        .user-pill {
            display:flex; align-items:center; gap:8px;
            background:rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.3);
            border-radius:30px; padding:6px 14px 6px 6px; cursor:pointer; transition:background .2s;
        }
        .user-pill:hover { background:rgba(255,255,255,.22); }
        .pill-avatar {
            width:32px; height:32px; border-radius:50%; background:#a0632a; color:white;
            display:flex; align-items:center; justify-content:center;
            font-weight:700; font-size:14px; overflow:hidden; flex-shrink:0;
        }
        .pill-avatar img { width:100%; height:100%; object-fit:cover; }
        .pill-name { font-size:14px; font-weight:600; }

        .dropdown {
            position:absolute; top:46px; right:0; background:white; color:black;
            border-radius:10px; display:none; flex-direction:column; min-width:200px;
            border:1px solid #ccc; box-shadow:0 8px 18px rgba(0,0,0,.16);
            padding:4px 0; animation:popup .15s ease; z-index:10;
        }
        .dropdown button {
            padding:10px 14px; border:none; background:none;
            text-align:left; cursor:pointer; width:100%; font-size:14px;
        }
        .dropdown button:hover { background:#f5f5f5; }
        @keyframes popup {
            0%{opacity:0;transform:translateY(-6px);}
            100%{opacity:1;transform:translateY(0);}
        }

        /* Carrito */
        .carrito {
            position:fixed; right:-400px; top:0; width:400px; height:100%;
            background:#fff; box-shadow:-6px 0 22px rgba(0,0,0,.2);
            padding:24px; transition:right .3s ease; z-index:20; overflow-y:auto;
        }
        .carrito.active { right:0; }
        .carrito h2 { margin-bottom:14px; color:#2e1b1b; }
        .carrito-item {
            margin:10px 0; padding:10px; border:1px solid #ddd;
            border-radius:8px; background:#fbfbfb; font-size:13px;
        }
        .carrito-item-top { display:flex; justify-content:space-between; align-items:center; }
        .carrito-item-nombre { font-weight:600; color:#3b2a1e; }
        .carrito-item-controles { display:flex; align-items:center; gap:6px; margin-top:6px; }
        .carrito-item-controles button {
            width:26px; height:26px; background:#4b2e2e; color:white;
            border:none; border-radius:5px; cursor:pointer; font-size:13px;
        }
        .carrito-total {
            margin-top:15px; padding-top:15px; border-top:2px solid #eee;
            font-size:17px; font-weight:700; color:#2e1b1b; text-align:right;
        }
        .btn-finalizar {
            width:100%; padding:13px; margin-top:12px;
            background:linear-gradient(to right,#4b2e2e,#2e1b1b);
            color:white; border:none; border-radius:8px; font-size:15px;
            font-weight:700; cursor:pointer; transition:opacity .2s;
        }
        .btn-finalizar:hover { opacity:.9; }

        /* Contenido */
        .container { max-width:1200px; margin:0 auto; padding:30px; }
        .titulo-seccion { text-align:center; margin-bottom:30px; }
        .titulo-seccion h1 { color:#3b2a1e; font-size:32px; margin-bottom:5px; }
        .titulo-seccion p { color:#7a5c47; font-style:italic; }
        .filtros { margin-bottom:25px; display:flex; gap:15px; flex-wrap:wrap; }
        .filtros input {
            padding:10px; border:1px solid #ccc; border-radius:8px;
            font-size:14px; min-width:250px;
        }

        /* Grid productos */
        #productos {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
            gap:25px; min-height:200px;
        }
        .card {
            background:white; border-radius:14px;
            box-shadow:0 4px 15px rgba(0,0,0,.08); overflow:hidden;
            display:flex; flex-direction:column; transition:all .3s ease;
        }
        .card:hover { transform:translateY(-5px); box-shadow:0 10px 28px rgba(0,0,0,.15); }
        .card-img {
            width:100%; height:180px; object-fit:cover; background:#f5ede4; display:block;
        }
        .card-img-placeholder {
            width:100%; height:180px; background:linear-gradient(135deg,#f5ede4,#e8d5c0);
            display:none; align-items:center; justify-content:center; font-size:50px;
        }
        .card-body { padding:18px; flex:1; display:flex; flex-direction:column; }
        .card h3 { color:#3b2a1e; margin-bottom:6px; font-size:17px; }
        .card-desc { color:#777; font-size:13px; margin-bottom:10px; flex:1; line-height:1.6; }
        .precio { font-size:22px; color:#2e7d32; font-weight:700; margin:8px 0; }
        .stock { font-size:12px; color:#888; margin-bottom:12px; }
        .btn {
            padding:10px; background:linear-gradient(to right,#4b2e2e,#2e1b1b);
            color:white; border:none; border-radius:8px; cursor:pointer;
            font-weight:600; transition:all .3s ease;
        }
        .btn:hover { transform:scale(1.02); box-shadow:0 4px 12px rgba(75,46,46,.3); }
        .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
        .vacio { text-align:center; color:#999; padding:40px; grid-column:1/-1; }
        .footer-bar {
            margin-top:50px; background:#2e1b1b; padding:30px;
            text-align:center; color:white;
        }
        .footer-redes { display:flex; justify-content:center; gap:15px; margin-top:10px; }
        .footer-red { color:rgba(255,255,255,.6); text-decoration:none; font-size:13px; transition:color .2s; }
        .footer-red:hover { color:white; }
    </style>
</head>
<body>

<div class="header">
    <span>☕ Sinfonía de Granos — Catálogo</span>
    <div class="header-right">
        <button class="icon-btn" onclick="toggleCarrito()" title="Carrito">🛒</button>
        <div class="user-menu">
            <div class="user-pill" onclick="toggleMenu()">
                <div class="pill-avatar" id="pillAvatar">?</div>
                <span class="pill-name" id="pillNombre">Cargando…</span>
                <span style="font-size:10px;opacity:.7">▾</span>
            </div>
            <div class="dropdown" id="menuUsuario">
                <button onclick="irInicio()">🏠 Inicio</button>
                <button onclick="irProductos()">📦 Productos (Actual)</button>
                <button onclick="irPerfil()">👤 Mi Perfil</button>
                <button onclick="historial()">🧾 Historial</button>
                <button id="btnAdmin" style="display:none;border-top:1px solid #ddd;padding-top:10px;margin-top:10px;" onclick="irAdmin()">⚙️ Panel Admin</button>
                <button onclick="logout()">🚪 Cerrar sesión</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="titulo-seccion">
        <h1>Nuestros Productos</h1>
        <p>"Calidad artesanal en cada taza"</p>
    </div>
    <div class="filtros">
        <input type="text" id="searchProductos" placeholder="🔍 Buscar productos…">
    </div>
    <div id="productos"></div>
</div>

<div class="footer-bar">
    <p>&copy; 2024 Sinfonía de Granos. Todos los derechos reservados.</p>
    <div class="footer-redes">
        <a href="https://instagram.com/TU_USUARIO_IG" target="_blank" class="footer-red">📸 Instagram</a>
        <a href="https://facebook.com/TU_PAGINA_FB"  target="_blank" class="footer-red">👍 Facebook</a>
    </div>
</div>

<!-- CARRITO LATERAL -->
<div class="carrito" id="carrito">
    <h2>🛒 Carrito de compras</h2>
    <div id="items"></div>
    <div class="carrito-total" id="carritoTotal"></div>
    <button class="btn-finalizar" onclick="finalizarCompra()">Finalizar Compra</button>
</div>

<script>
let carritoData = JSON.parse(localStorage.getItem('carrito')) || {};

function toggleCarrito() {
    document.getElementById('carrito').classList.toggle('active');
    renderCarrito();
}
function toggleMenu() {
    const m = document.getElementById('menuUsuario');
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}
function agregarCarrito(nombre, precio, id) {
    if (carritoData[id]) carritoData[id].cantidad++;
    else carritoData[id] = { nombre, precio: parseFloat(precio), cantidad: 1 };
    localStorage.setItem('carrito', JSON.stringify(carritoData));
    renderCarrito();
    document.getElementById('carrito').classList.add('active');
}
function renderCarrito() {
    const cont  = document.getElementById('items');
    const totEl = document.getElementById('carritoTotal');
    cont.innerHTML = '';
    let total = 0;
    for (let id in carritoData) {
        const p = carritoData[id];
        total += p.precio * p.cantidad;
        cont.innerHTML += `
            <div class="carrito-item">
                <div class="carrito-item-top">
                    <span class="carrito-item-nombre">${p.nombre}</span>
                    <span>$${(p.precio * p.cantidad).toFixed(2)}</span>
                </div>
                <div class="carrito-item-controles">
                    <button onclick="cambiarCantidad(${id},-1)">−</button>
                    <span>${p.cantidad}x</span>
                    <button onclick="cambiarCantidad(${id},1)">+</button>
                    <button onclick="remover(${id})" style="background:#c53030">✕</button>
                </div>
            </div>`;
    }
    if (!Object.keys(carritoData).length) {
        cont.innerHTML = '<p style="text-align:center;color:#999;padding:20px">Tu carrito está vacío</p>';
        totEl.textContent = '';
    } else {
        totEl.textContent = `Total: $${total.toFixed(2)} MXN`;
    }
}
function cambiarCantidad(id, d) {
    if (!carritoData[id]) return;
    carritoData[id].cantidad += d;
    if (carritoData[id].cantidad <= 0) delete carritoData[id];
    localStorage.setItem('carrito', JSON.stringify(carritoData));
    renderCarrito();
}
function remover(id) {
    delete carritoData[id];
    localStorage.setItem('carrito', JSON.stringify(carritoData));
    renderCarrito();
}
function finalizarCompra() {
    if (!Object.keys(carritoData).length) { alert('❌ Tu carrito está vacío'); return; }
    alert('✅ Gracias por tu compra. Funcionalidad de pago próximamente.');
}

document.addEventListener('click', e => {
    const um = document.querySelector('.user-menu');
    const c  = document.getElementById('carrito');
    if (!um.contains(e.target)) document.getElementById('menuUsuario').style.display = 'none';
    if (!c.contains(e.target) && !e.target.closest('.icon-btn')) c.classList.remove('active');
});

function irInicio()    { window.location.href = 'principal.html'; }
function irProductos() { window.location.href = 'productos.html'; }
function irPerfil()    { window.location.href = 'perfil.html'; }
function irAdmin()     { window.location.href = 'admin.html'; }
function historial()   { alert('Historial de compras próximamente 🧾'); }

async function logout() {
    await supabaseClient.auth.signOut();
    ['carrito','userRole','userName','isLoggedIn','userRoleNormalized','userFoto']
        .forEach(k => localStorage.removeItem(k));
    window.location.href = 'index.html';
}

function buscarProductos() {
    const term = document.getElementById('searchProductos').value.toLowerCase();
    document.querySelectorAll('#productos .card').forEach(c => {
        c.style.display = c.textContent.toLowerCase().includes(term) ? '' : 'none';
    });
}
document.getElementById('searchProductos')?.addEventListener('keyup', buscarProductos);

initHeader();
</script>
</body>
</html>
