<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Sinfonía de Granos</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
        }

        .login-container {
            background: white;
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .login-container h1 {
            color: #3b2a1e;
            margin-bottom: 5px;
        }

        .eslogan {
            font-style: italic;
            color: #7a5c47;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #5a4636;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            text-align: center;
            color: #aaa;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ddd;
        }

        .divider:not(:empty)::before {
            margin-right: .75em;
        }

        .divider:not(:empty)::after {
            margin-left: .75em;
        }

        .btn-google {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .extra {
            margin-top: 20px;
            font-size: 13px;
            color: #777;
        }

        .extra a {
            color: #4b2e2e;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <h1>Sinfonía de Granos</h1>
        <div class="eslogan">"De la semilla a la taza"</div>

        <form id="loginForm">

            <div class="input-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn-login">
                Iniciar Sesión
            </button>

        </form>

        <div class="divider">o</div>

        <button type="button" class="btn-google" onclick="loginGoogle()">
            <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" width="18">
            Continuar con Google
        </button>

        <div class="extra">
            ¿No tienes cuenta? <a href="#">Regístrate</a>
        </div>

    </div>

    <script>

        const supabaseUrl = "https://ibftxwnyyxxvouymdcxu.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliZnR4d255eXh4dm91eW1kY3h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTg1ODgsImV4cCI6MjA4ODgzNDU4OH0.pC6q8GP14udTvKHWILwnOJwGmE6F7oZPWXdrYolM-78";

        const supabase = window.supabase.createClient(
            supabaseUrl,
            supabaseKey
        );

    </script>

    <script>

        /* LOGIN CON EMAIL */

        document.getElementById("loginForm").addEventListener("submit", async (e) => {

            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const { error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                alert(error.message);
                return;
            }

            window.location.href = "principal.html";

        });


        /* LOGIN CON GOOGLE */

        async function loginGoogle() {

            await supabase.auth.signInWithOAuth({
                provider: "google",
                options: {
                    redirectTo: window.location.origin
                }
            });

        }


        /* GUARDAR USUARIO EN PROFILES */

        async function guardarUsuario() {

            const { data: { user } } = await supabase.auth.getUser();

            if (!user) return;

            const { data } = await supabase
                .from("profiles")
                .select("id")
                .eq("id", user.id)
                .single();

            if (!data) {

                await supabase.from("profiles").insert({
                    id: user.id,
                    email: user.email,
                    nombre: user.user_metadata.full_name
                });

            }

        }


        /* DETECTAR SESION */

        supabase.auth.getSession().then(async ({ data }) => {

            if (data.session) {

                await guardarUsuario();

                window.location.href = "principal.html";

            }

        });

    </script>

</body>

</html>
