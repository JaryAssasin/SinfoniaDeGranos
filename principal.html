<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sinfonía de Granos</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #f4f1ee, #e8e2dc);
        }

        .header {
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            font-size: 20px;
        }

        .logout-btn {
            background: #fff;
            color: #2e1b1b;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .contenedor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 80px;
            gap: 50px;
        }

        .descripcion {
            width: 42%;
        }

        .descripcion h2 {
            font-size: 32px;
            color: #3b2a1e;
            margin-bottom: 10px;
        }

        .descripcion p {
            font-size: 16px;
            line-height: 1.8;
            color: #5a4636;
            margin-bottom: 15px;
        }

        .producto {
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            margin-top: 25px;
            text-align: center;
        }

        .precio {
            font-size: 24px;
            color: #2e7d32;
            font-weight: bold;
            margin: 15px 0;
        }

        .contador {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
        }

        .contador button {
            width: 35px;
            height: 35px;
            background-color: #4b2e2e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .contador span {
            margin: 0 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .boton {
            padding: 12px 25px;
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .logo-grande {
            width: 200px;
            margin-top: 15px;
        }

        .slider-container {
            width: 55%;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 480px;
            overflow: hidden;
            border-radius: 25px;
        }

        /* 🔥 FIX IMPORTANTE */
        .slides {
            display: flex;
            width: 100%;
        }

        .slides img {
            width: 100%;
            height: 480px;
            object-fit: cover;
            flex-shrink: 0; /* 👈 clave para que no se amontonen */
        }

        .btn-slide {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        .footer-bar {
            margin-top: 50px;
            background: #2e1b1b;
            padding: 30px;
            text-align: center;
            color: white;
        }
    </style>
</head>

<body>

<div class="header">
    <span>Sinfonía de Granos</span>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
</div>

<div class="contenedor">

    <div class="descripcion">
        <h2>Café de Tanetze de Zaragoza</h2>

        <p>Producto artesanal de alta calidad.</p>

        <div class="producto">
            <h3>Café Molido - Medio Kilo</h3>
            <div class="precio">$200 MXN</div>

            <div class="contador">
                <button onclick="disminuir()">-</button>
                <span id="cantidad">1</span>
                <button onclick="aumentar()">+</button>
            </div>

            <div class="boton" onclick="comprar()">Comprar Ahora</div>

            <img src="LOGO.png" class="logo-grande">
        </div>
    </div>

    <div class="slider-container">
        <div class="slider">
            <div class="slides" id="slides">
                <img src="galeria/img1.jpg">
                <img src="galeria/img2.jpg">
                <img src="galeria/img3.jpg">
                <img src="galeria/img4.jpg">
            </div>

            <button class="btn-slide prev" onclick="moverSlide(-1)">❮</button>
            <button class="btn-slide next" onclick="moverSlide(1)">❯</button>
        </div>
    </div>

</div>

<script>
let indiceSlide = 0;

function moverSlide(dir) {
    const slides = document.getElementById("slides");
    const total = slides.children.length;

    indiceSlide += dir;

    if (indiceSlide < 0) indiceSlide = total - 1;
    if (indiceSlide >= total) indiceSlide = 0;

    slides.style.transform = `translateX(-${indiceSlide * 100}%)`;
}

setInterval(() => moverSlide(1), 4000);

function aumentar() {
    let c = document.getElementById("cantidad");
    c.innerText = parseInt(c.innerText) + 1;
}

function disminuir() {
    let c = document.getElementById("cantidad");
    if (parseInt(c.innerText) > 1) c.innerText--;
}

function comprar() {
    let cantidad = document.getElementById("cantidad").innerText;
    alert("Agregaste " + cantidad + " producto(s) 🛒");
}

// 🔐 LOGOUT
async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = "index.html";
}
</script>

</body>
</html>
