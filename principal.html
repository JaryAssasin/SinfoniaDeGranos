<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Principal - Sinfonía de Granos</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
            color: white;
            min-height: 100vh;
        }

        .header {
            background: #2e1b1b;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
        }

        .user {
            font-size: 14px;
        }

        .btn-logout {
            background: #ff4d4d;
            border: none;
            padding: 8px 12px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
        }

        .card h2 {
            margin-bottom: 10px;
        }

        .modules {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .module {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            width: 180px;
            cursor: pointer;
            transition: 0.3s;
        }

        .module:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>☕ Sinfonía de Granos</h1>

        <div class="user">
            <span id="userEmail">Cargando...</span>
            <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="container">

        <div class="card">
            <h2>Bienvenido 👋</h2>
            <p>Sistema de gestión</p>
        </div>

        <!-- MÓDULOS (luego los conectas) -->
        <div class="modules">

            <div class="module">
                📦 Productos
            </div>

            <div class="module">
                🧾 Pedidos
            </div>

            <div class="module">
                👥 Clientes
            </div>

            <div class="module">
                📊 Reportes
            </div>

        </div>

    </div>

    <script>
        const supabaseUrl = "https://ibftxwnyyxxvouymdcxu.supabase.co";
        const supabaseKey = "TU_PUBLIC_ANON_KEY_AQUI";

        const supabase = window.supabase.createClient(
            supabaseUrl,
            supabaseKey
        );

        // 🔐 VERIFICAR SESIÓN
        async function verificarSesion() {

            const { data } = await supabase.auth.getSession();

            if (!data.session) {
                window.location.href = "index.html";
                return;
            }

            // Mostrar usuario
            const user = data.session.user;
            document.getElementById("userEmail").innerText = user.email;

        }

        // 🚪 LOGOUT
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        }

        verificarSesion();
    </script>

</body>

</html>
