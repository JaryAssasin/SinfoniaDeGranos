<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sinfonía de Granos</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #f4f1ee, #e8e2dc);
        }

        .header {
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            font-size: 20px;
        }

        .logout-btn {
            background: #fff;
            color: #2e1b1b;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* BOTONES HEADER */
        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-menu {
            position: relative;
        }

        .icon-btn {
            background: white;
            color: #2e1b1b;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .icon-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        /* MENU USUARIO */
        .dropdown {
            position: absolute;
            top: 42px;
            right: 0;
            background: white;
            color: black;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            min-width: 180px;
            border: 1px solid #ccc;
            box-shadow: 0 8px 18px rgba(0,0,0,0.16);
            padding: 4px 0;
            animation: popup .15s ease;
            z-index: 10;
        }

        .dropdown button {
            padding: 10px 14px;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            width: 100%;
        }

        .dropdown button:hover {
            background: #f5f5f5;
        }

        @keyframes popup {
            0% {opacity: 0; transform: translateY(-6px);}
            100% {opacity: 1; transform: translateY(0);}
        }

        /* CARRITO */
        .carrito {
            position: fixed;
            right: -380px;
            top: 0;
            width: 380px;
            height: 100%;
            background: #fff;
            box-shadow: -6px 0 22px rgba(0,0,0,0.2);
            padding: 24px;
            transition: right 0.3s ease;
            z-index: 20;
        }

        .carrito.active {
            right: 0;
        }

        .carrito h2 {
            margin-bottom: 14px;
            color: #2e1b1b;
        }

        #items p {
            margin: 10px 0;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            background: #fbfbfb;
        }

        #items p div {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #items p div button {
            width: 25px;
            height: 25px;
            background: #4b2e2e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .contenedor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 80px;
            gap: 50px;
        }

        .descripcion {
            width: 42%;
        }

        .descripcion h2 {
            font-size: 32px;
            color: #3b2a1e;
            margin-bottom: 10px;
        }

        .descripcion p {
            font-size: 16px;
            line-height: 1.8;
            color: #5a4636;
            margin-bottom: 15px;
        }

        .producto {
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            margin-top: 25px;
            text-align: center;
        }

        .precio {
            font-size: 24px;
            color: #2e7d32;
            font-weight: bold;
            margin: 15px 0;
        }

        .contador {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
        }

        .contador button {
            width: 35px;
            height: 35px;
            background-color: #4b2e2e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .contador span {
            margin: 0 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .boton {
            padding: 12px 25px;
            background: linear-gradient(to right, #4b2e2e, #2e1b1b);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .logo-grande {
            width: 200px;
            margin-top: 15px;
        }

        .slider-container {
            width: 55%;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 480px;
            overflow: hidden;
            border-radius: 25px;
        }

        /* 🔥 FIX IMPORTANTE */
        .slides {
            display: flex;
            width: 100%;
        }

        .slides img {
            width: 100%;
            height: 480px;
            object-fit: cover;
            flex-shrink: 0; /* 👈 clave para que no se amontonen */
        }

        .btn-slide {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        .footer-bar {
            margin-top: 50px;
            background: #2e1b1b;
            padding: 30px;
            text-align: center;
            color: white;
        }
    </style>
</head>

<body>

<div class="header">
    <span>Sinfonía de Granos</span>

    <div class="header-right">
        <button class="icon-btn" onclick="toggleCarrito()">🛒</button>

        <div class="user-menu">
            <button class="icon-btn" onclick="toggleMenu()">👤</button>

            <div class="dropdown" id="menuUsuario">
                <button onclick="irInicio()">🏠 Inicio</button>
                <button onclick="irProductos()">📦 Productos</button>
                <button onclick="historial()">📦 Historial</button>
                <button id="btnAdmin" style="display:none; border-top: 1px solid #ddd; padding-top: 10px; margin-top: 10px;" onclick="irAdmin()">⚙️ Panel Admin</button>
                <button onclick="logout()">🚪 Cerrar sesión</button>
            </div>
        </div>
    </div>
</div>

<div class="contenedor">

    <div class="descripcion">
        <h2>Café de Tanetze de Zaragoza</h2>

        <p>Producto artesanal de alta calidad.</p>

        <div class="producto">
            <h3>Café Molido - Medio Kilo</h3>
            <div class="precio">$200 MXN</div>

            <div class="contador">
                <button onclick="disminuir()">-</button>
                <span id="cantidad">1</span>
                <button onclick="aumentar()">+</button>
            </div>

            <div class="boton" onclick="comprar()">Comprar Ahora</div>

            <div class="boton" onclick="verCatalogo()">Ver Catálogo Completo</div>

        </div>
    </div>

    <div class="slider-container">
        <div class="slider">
            <div class="slides" id="slides">
                <img src="Galeria/img1.jpg">
                <img src="Galeria/img2.jpg">
                <img src="Galeria/img3.jpg">
                <img src="Galeria/img4.jpg">
            </div>

            <button class="btn-slide prev" onclick="moverSlide(-1)">❮</button>
            <button class="btn-slide next" onclick="moverSlide(1)">❯</button>
        </div>
    </div>

</div>

<div class="footer-bar">
    <p>&copy; 2024 Sinfonía de Granos. Todos los derechos reservados.</p>
</div>

<!-- CARRITO -->
<div class="carrito" id="carrito">
    <h2>Carrito</h2>
    <div id="items"></div>
</div>

<script>
let indiceSlide = 0;
let carrito = JSON.parse(localStorage.getItem('carrito')) || {};

function moverSlide(dir) {
    const slides = document.getElementById("slides");
    const total = slides.children.length;

    indiceSlide += dir;

    if (indiceSlide < 0) indiceSlide = total - 1;
    if (indiceSlide >= total) indiceSlide = 0;

    slides.style.transform = `translateX(-${indiceSlide * 100}%)`;
}

setInterval(() => moverSlide(1), 4000);

function aumentar() {
    let c = document.getElementById("cantidad");
    c.innerText = parseInt(c.innerText) + 1;
}

function disminuir() {
    let c = document.getElementById("cantidad");
    if (parseInt(c.innerText) > 1) c.innerText--;
}

function comprar() {
    let cantidad = document.getElementById("cantidad").innerText;
    // Asumir id 1 para el producto principal
    agregarCarrito('Café Molido - Medio Kilo', 200, 1, parseInt(cantidad));
    alert("Agregaste " + cantidad + " producto(s) 🛒");
}

function verCatalogo() {
    window.location.href = "productos.html";
}

function toggleCarrito() {
    document.getElementById("carrito").classList.toggle("active");
    renderCarrito();
}

function toggleMenu() {
    const menu = document.getElementById("menuUsuario");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function agregarCarrito(nombre, precio, id, cantidad = 1) {
    if (carrito[id]) {
        carrito[id].cantidad += cantidad;
    } else {
        carrito[id] = { nombre, precio, cantidad };
    }
    localStorage.setItem('carrito', JSON.stringify(carrito));
    renderCarrito();
}

function renderCarrito() {
    let cont = document.getElementById("items");
    cont.innerHTML = "";

    for (let id in carrito) {
        let p = carrito[id];
        cont.innerHTML += `
            <p>
                ${p.nombre} - $${p.precio}
                <div>
                    <button onclick="cambiarCantidad(${id}, -1)">-</button>
                    ${p.cantidad}
                    <button onclick="cambiarCantidad(${id}, 1)">+</button>
                    <button onclick="remover(${id})">X</button>
                </div>
            </p>
        `;
    }
}

function cambiarCantidad(id, delta) {
    if (carrito[id]) {
        carrito[id].cantidad += delta;
        if (carrito[id].cantidad <= 0) {
            delete carrito[id];
        }
        localStorage.setItem('carrito', JSON.stringify(carrito));
        renderCarrito();
    }
}

function remover(id) {
    delete carrito[id];
    localStorage.setItem('carrito', JSON.stringify(carrito));
    renderCarrito();
}

// Cerrar menú y carrito al click fuera
document.addEventListener('click', function(event) {
    const menu = document.getElementById("menuUsuario");
    const carritoEl = document.getElementById("carrito");
    const userMenu = document.querySelector('.user-menu');

    if (!userMenu.contains(event.target)) {
        menu.style.display = 'none';
    }

    if (!carritoEl.contains(event.target) && !event.target.closest('.icon-btn')) {
        carritoEl.classList.remove('active');
    }
});

async function logout() {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('carrito');
    localStorage.removeItem('userRole');
    localStorage.removeItem('userName');
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('userRoleNormalized');
    window.location.href = "index.html";
}

function irInicio() {
    window.location.href = "principal.html";
}

function irProductos() {
    window.location.href = "productos.html";
}

function irAdmin() {
    window.location.href = "admin.html";
}

function historial() {
    alert("Aquí irá el historial 🧠");
}

// Verificar rol del usuario y mostrar botón de admin si es necesario
function verificarRol() {
    const userRole = localStorage.getItem('userRole');
    const btnAdmin = document.getElementById('btnAdmin');
    
    if (userRole === 'admin' && btnAdmin) {
        btnAdmin.style.display = 'block';
    }
}

async function checkSession() {
    const { data } = await supabaseClient.auth.getSession();

    if (!data.session) {
        window.location.href = "index.html";
        return;
    }
    
    // Verificar rol al cargar
    verificarRol();
}

checkSession();
</script>

</body>
</html>
