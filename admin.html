<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Sinfonía de Granos</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #2e1b1b 0%, #1a0f0f 100%);
            border-right: 2px solid #4b2e2e;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #4b2e2e;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            color: #f4a460;
            font-size: 18px;
            text-align: center;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-link {
            display: block;
            padding: 12px 20px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            border-left: 3px solid transparent;
        }

        .nav-link:hover {
            background: rgba(75, 46, 46, 0.5);
            color: #f4a460;
            border-left-color: #f4a460;
        }

        .nav-link.active {
            background: rgba(244, 164, 96, 0.2);
            color: #f4a460;
            border-left-color: #f4a460;
        }

        /* MAIN */
        .main-content {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #4b2e2e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-logout {
            background: #ff6b6b;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 6px;
            color: white;
        }

        .content-area {
            padding: 30px;
        }

        /* MODAL FIX */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a0f0f;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
        }

        input, select, textarea {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            background: #2e1b1b;
            border: 1px solid #4b2e2e;
            color: white;
            border-radius: 5px;
        }

        button {
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        td, th {
            padding: 10px;
            border-bottom: 1px solid #4b2e2e;
        }

        /* MÓDULOS */
        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .module-header h2 {
            color: #f4a460;
            font-size: 24px;
        }

        .btn-primary {
            background: #f4a460;
            color: #1a0f0f;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #e89350;
        }

        /* STATS */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(75, 46, 46, 0.3);
            border: 1px solid #4b2e2e;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h4 {
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-value {
            color: #f4a460;
            font-size: 24px;
            font-weight: bold;
        }

        /* TABLAS */
        .table-container {
            background: rgba(75, 46, 46, 0.2);
            border: 1px solid #4b2e2e;
            border-radius: 8px;
            padding: 20px;
        }

        .table-container h3 {
            color: #f4a460;
            margin-bottom: 15px;
        }

        table th {
            background: rgba(244, 164, 96, 0.1);
            color: #f4a460;
            font-weight: 600;
        }

        table tbody tr:hover {
            background: rgba(244, 164, 96, 0.05);
        }

        /* CLOSE BUTTON */
        .close {
            color: #999;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .close:hover {
            color: #f4a460;
        }

        /* MODAL DISPLAY */
        .modal {
            display: none !important;
        }

        .modal.active {
            display: flex !important;
        }
    </style>
</head>

<body>

<div class="admin-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Panel Admin</h2>
        </div>

        <ul class="nav-menu">
            <li><a class="nav-link active" data-module="inventario" onclick="loadModule('inventario')">📦 Inventario</a></li>
            <li><a class="nav-link" data-module="reportes" onclick="loadModule('reportes')">📊 Reportes</a></li>
            <li><a class="nav-link" data-module="usuarios" onclick="loadModule('usuarios')">👤 Usuarios</a></li>
            <li><a class="nav-link" data-module="pagos" onclick="loadModule('pagos')">💳 Pagos</a></li>
        </ul>
    </aside>

    <!-- MAIN -->
    <div class="main-content">

        <header class="header">
            <h2>Sinfonía de Granos</h2>
            <button class="btn-logout" onclick="logoutAdmin()">Cerrar sesión</button>
        </header>

        <div class="content-area" id="moduleContent">
            <!-- contenido dinámico -->
        </div>

    </div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
