<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Sinfonía de Granos</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <!-- External CSS -->
    <link href="css/admin.css" rel="stylesheet">

    <style>
        /* Estilos específicos que no están en admin.css */
    </style>
</head>

<body>

<div class="admin-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Panel Admin</h2>
        </div>

        <ul class="nav-menu">
            <li><a class="nav-link active" data-module="inventario" onclick="loadModule('inventario')">📦 Inventario</a></li>
            <li><a class="nav-link" data-module="reportes" onclick="loadModule('reportes')">📊 Reportes</a></li>
            <li><a class="nav-link" data-module="usuarios" onclick="loadModule('usuarios')">👤 Usuarios</a></li>
            <li><a class="nav-link" data-module="pagos" onclick="loadModule('pagos')">💳 Pagos</a></li>
        </ul>
    </aside>

    <!-- MAIN -->
    <div class="main-content">

        <header class="header">
            <h2>🌾 Sinfonía de Granos - Panel Admin</h2>
            <div class="header-right">
                <span class="role-badge" id="currentUserRole">Usuario</span>
                <button class="btn-logout" onclick="logoutAdmin()">🚪 Cerrar sesión</button>
            </div>
        </header>

        <div class="content-area" id="moduleContent">
            <!-- contenido dinámico -->
        </div>

    </div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
